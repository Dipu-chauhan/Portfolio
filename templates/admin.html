<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>People Messages</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <header class="bg-white shadow-sm">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <h1 class="text-2xl font-bold text-gray-800">Admin - Contact Messages</h1>
            <a href="/" class="text-blue-600 hover:text-blue-800 font-medium">Back to Portfolio</a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-8">
        <div class="bg-white rounded-xl shadow p-4 mb-6 flex items-center justify-between">
            <p class="text-gray-700">Database: <span class="font-semibold">portfolio</span> (local MongoDB)</p>
            <button id="refreshBtn" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">Refresh</button>
        </div>

        <p id="statusText" class="mb-4 text-sm text-gray-600"></p>
        <div id="messagesContainer" class="space-y-4"></div>
    </main>

    <script>
        const messagesContainer = document.getElementById('messagesContainer');
        const statusText = document.getElementById('statusText');
        const refreshBtn = document.getElementById('refreshBtn');

        function escapeHtml(value) {
            return String(value)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        async function loadMessages() {
            statusText.textContent = 'Loading messages...';
            statusText.className = 'mb-4 text-sm text-gray-600';

            try {
                const response = await fetch('/api/admin/messages');
                const result = await response.json();

                if (!response.ok || !result.ok) {
                    throw new Error(result.message || 'Failed to load messages.');
                }

                if (!result.messages.length) {
                    messagesContainer.innerHTML = '<div class="bg-white rounded-xl shadow p-6 text-gray-600">No messages found.</div>';
                    statusText.textContent = 'No data to display.';
                    return;
                }

                messagesContainer.innerHTML = result.messages.map((item) => {
                    const safeName = escapeHtml(item.name);
                    const safeEmail = escapeHtml(item.email);
                    const safeMessage = escapeHtml(item.message);
                    const safeDate = escapeHtml(item.created_at || 'Unknown time');
                    const replySubject = encodeURIComponent('Reply from Portfolio');
                    const replyBody = encodeURIComponent(`Hi ${item.name},%0A%0AThanks for your message:%0A"${item.message}"%0A%0A`);
                    const mailto = `mailto:${item.email}?subject=${replySubject}&body=${replyBody}`;

                    return `
                        <div class="bg-white rounded-xl shadow p-6" data-id="${item.id}">
                            <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-3">
                                <div>
                                    <h2 class="text-lg font-semibold text-gray-800">${safeName}</h2>
                                    <p class="text-blue-600">${safeEmail}</p>
                                    <p class="text-xs text-gray-500 mt-1">${safeDate}</p>
                                </div>
                                <div class="flex gap-2">
                                    <a href="${mailto}" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">Reply</a>
                                    <button class="delete-btn px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition" data-id="${item.id}">
                                        Delete
                                    </button>
                                </div>
                            </div>
                            <p class="mt-4 text-gray-700 whitespace-pre-wrap">${safeMessage}</p>
                        </div>
                    `;
                }).join('');

                statusText.textContent = `Loaded ${result.messages.length} messages.`;
            } catch (error) {
                statusText.textContent = error.message || 'Something went wrong.';
                statusText.className = 'mb-4 text-sm text-red-600';
            }
        }

        async function deleteMessage(messageId) {
            const confirmed = window.confirm('Delete this message?');
            if (!confirmed) return;

            try {
                const response = await fetch(`/api/admin/messages/${messageId}`, {
                    method: 'DELETE'
                });
                const result = await response.json();

                if (!response.ok || !result.ok) {
                    throw new Error(result.message || 'Failed to delete message.');
                }

                await loadMessages();
            } catch (error) {
                statusText.textContent = error.message || 'Could not delete message.';
                statusText.className = 'mb-4 text-sm text-red-600';
            }
        }

        messagesContainer.addEventListener('click', (event) => {
            const target = event.target.closest('.delete-btn');
            if (!target) return;
            const messageId = target.getAttribute('data-id');
            if (messageId) {
                deleteMessage(messageId);
            }
        });

        refreshBtn.addEventListener('click', loadMessages);
        loadMessages();
    </script>
</body>
</html>
